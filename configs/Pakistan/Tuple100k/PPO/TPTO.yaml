
policy: "TPTO"
algo: "PPO"

env:
  dataset: "Pakistan"
  flag: "Tuple100K"
  refresh_rate: 0.005

eval:
  lambda: [3.993e-02, 4.321e+00, 2.654e+02]
  expected_values: [0.2, 4.0, 300.0]

training:
  num_epochs: 40
  lr: 0.1              # paper: policy LR = 0.1 (Adagrad)
  lr_decay: 1.0
  gamma: 0.99          # paper: γ = 0.99

  # PPO-specific (paper §5)
  gae_lambda: 0.95       # GAE trace-decay λ
  clip_eps: 0.2          # paper: ε = 0.2
  entropy_coef: 0.5      # paper: c2 = 0.5
  value_loss_coef: 1.0   # paper uses separate LR (0.01) for value; we weight the loss instead
  clip_grad_norm: 0.5
  ppo_epochs: 4
  rollout_size: 100      # paper: batch size = 100
  mini_batch_size: 100   # one mini-batch = full rollout (paper trains on full batch)

  reward:
    momentum: 0.999
    norm: "ln_standard"
    eps: 1.e-2

  optimizer:
    type: "Adagrad"      # paper: Adagrad optimizer
    weight_decay: 0.0

  lambda: [0.350000, 0.350000, 0.300000]
  early_stop_patience: 20
  log_freq: 200


model:
  d_model: 512          # paper: hidden size = 512
  n_layers: 3           # paper: 3 Transformer layers
  n_heads: 8            # paper: 8 attention heads
  d_ff: 512             # paper: FFN dimension = 512
  dropout: 0.4          # paper: dropout = 0.4
  obs_type: ["cpu", "bw", "buffer"]
