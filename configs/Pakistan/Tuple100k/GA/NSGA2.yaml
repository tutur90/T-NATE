policy: "NSGA2"
algo: "NSGA2" 

seed: 3

env:
  dataset: "Pakistan"
  flag: "Tuple100K"
  refresh_rate: 0.005

eval:
  lambda: [1.889e-03, 4.394e+00, 2.605e+02]
  expected_max_latency: 4
  expected_max_energy: 300


training:
  num_epochs: 400          # Number of generations
  pop_size: 190            # Population size
  mutation_mode: "self_adaptive"   # "fixed" | "proportional" | "self_adaptive"
  mutation_sigma: 1     # fixed: He std if null; proportional: scale factor (default 0.1)
  mutation_tau: 0.1      # self_adaptive only: meta learning rate for σ factors
  early_stop_patience: 300 # Generations without improvement before stopping
  # Max allowed value per objective [ttr, latency, energy] — null disables the constraint
  min_scores: [0.37, 37.0, 375.0]


model:
  d_model: 64
  n_layers: 2
  # obs_type: ["cpu"]
  obs_type: ["cpu", "bw", "buffer"]
  activation: "relu"
