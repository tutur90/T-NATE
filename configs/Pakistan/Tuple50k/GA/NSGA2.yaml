policy: "NSGA2"
algo: "NSGA2" 

seed: 42

env:
  dataset: "Pakistan"
  flag: "Tuple30K"
  refresh_rate: 0.005

eval:
  lambda: [1.889e-03, 4.394e+00, 2.605e+02]
  expected_max_latency: 4
  expected_max_energy: 300


training:
  num_epochs: 400         # Number of generations for NPGA
  pop_size: 50            # Population size for NPGA
  mutation_rate: 0.2      # Mutation rate for Gaussian mutation
  early_stop_patience: 100 # Early stopping patience (generations without improvement)

selection:
  # Minimum acceptable quality per objective (acts as upper bound since all objectives are minimized).
  # Individuals exceeding any threshold are disqualified during selection.
  # Set to null to disable the constraint for that objective.
  # Objectives order: [ttr, latency, energy]
  min_scores: [0.17, 25., 375.]


model:
  d_model: 64
  n_layers: 2
  # obs_type: ["cpu"]
  obs_type: ["cpu", "bw", "buffer"]
