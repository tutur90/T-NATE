
policy: "T-NATE"
algo: "DQL"

seed: 0

env:
  dataset: "Pakistan"
  flag: "Tuple30K"
  refresh_rate: 0.005

eval:
  lambda: [1.889e-03, 4.394e+00, 2.605e+02]


training:
  num_epochs: 30
  learning_starts: 5000    # random steps before learning begins
  warmup: 0.1                # LR warmup as ratio of total training steps
  buffer_size: 50000      # max replay buffer size
  batch_size: 32          # samples per update
  target_update_freq: 10000  # >= 1 → hard copy every N grad steps | < 1 → soft update with τ = value
  update_freq: 16          # steps between policy updates
  lr: 5.0e-5
  ref_d_model: 128
  # ref_n_layers: 2
  lr_decay: 1
  gamma: 0.99
  # Exploration strategy: "epsilon_greedy" (default), "boltzmann", or "ucb"
  # exploration: {'strategy': 'ucb', explore_value: 2.0}
  exploration: {'strategy': 'epsilon_greedy', 'explore_value': 0.3, 'explore_min': 0.02, 'explore_decay': 0.7} 

  reward:
    momentum: 0.9995
    norm: "standard"  # "none", "mean"
    scale: 1
    eps: 1.e-1
    clip: 5.0
    storage_norm: true

  optimizer:
    type: "Adam"
    weight_decay: 0

  lambda: [0.5, 0.200, 0.300]
  early_stop_patience: 20 # Early stopping patience (generations without improvement)
  log_freq: 0      # Steps between logging training metrics

model:
    d_model: 256
    n_layers: 1
    d_heads: 32
    mlp_ratio: 4
    dropout: 0.0
    obs_type: ['cpu', 'bw', 'buffer', 'task']
    qk_norm: True
    embed: regular  
    pre_conditioning: add  # 'add' or 'concat'
    n_prefix: 1
    residual_type: plain


device: auto