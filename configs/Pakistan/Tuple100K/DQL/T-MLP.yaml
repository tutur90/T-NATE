policy: "T-MLP"
algo: "DQL"

seed: 42

env:
  dataset: "Pakistan"
  flag: "Tuple100K"
  refresh_rate: 0.005

eval:
  lambda: [1.889e-03, 4.394e+00, 2.605e+02]
  expected_values: [0.2, 4.0, 300.0]

training:
    num_epochs: 30
    learning_starts: 5000
    warmup: 0
    buffer_size: 50000
    batch_size: 256
    target_update_freq: 5000
    update_freq: 1
    lr: 5.e-05
    lr_decay: 1
    gamma: 0.99
    exploration: {'strategy': 'ucb', 'explore_value': 2.0}
    # exploration: {'strategy': 'epsilon_greedy', 'explore_value': 1., 'explore_min': 0.05, 'explore_decay': 0.5}
    reward: {'momentum': 0.9995, 'norm': 'standard', 'scale': 1, 'eps': 0.1, 'clip': 5.0, 'storage_norm': True, log1p: True}
    optimizer: {'type': 'Adam', 'weight_decay': 0}
    lambda: [0.3, 0.4, 0.3]
    early_stop_patience: 20
    log_freq: 0

model:
    d_model: 512
    n_layers: 2
    obs_type: ['cpu', 'bw', 'buffer', 'task']

    bias: True
    dropout: 0

