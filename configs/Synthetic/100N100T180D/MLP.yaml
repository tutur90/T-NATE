
policy: "MLP"
algo: "DQL"

seed: 42

env:
  dataset: "Synthetic"
  flag: "N100T100D150"
  refresh_rate: 0.005

eval:
  lambda: [1.889e-03, 4.394e+00, 2.605e+02]
  expected_values: [0.2, 4.0, 300.0]


training:
  num_epochs: 50
  learning_starts: 5000    # random steps before learning begins
  warmup: 0                # LR warmup as ratio of total training steps
  buffer_size: 50000      # max replay buffer size
  batch_size: 512          # samples per update
  target_update_freq: 1000  # >= 1 → hard copy every N grad steps | < 1 → soft update with τ = value
  update_freq: 8          # steps between policy updates
  lr: 5.e-5
  lr_decay: 1
  gamma: 0.99
  # Exploration strategy: "epsilon_greedy" (default), "boltzmann", or "ucb"
  exploration:
    strategy: "boltzmann"
    temperature: 0.8
    temperature_min: 0.05
    temperature_decay: 0.5

  # clip_grad_norm: 1.0          # Max norm for gradient clipping

  reward:
    momentum: 0.999
    norm: "ln_standard"  # "none", "mean", "ln_mean", "standard", "ln_standard"
    scale: 1
    eps: 1.e-2
  optimizer:
    type: "RMSprop"
    weight_decay: 0
  lambda: [0.350000,0.350000,0.300000]
  early_stop_patience: 20 # Early stopping patience (generations without improvement)
  log_freq: 0      # Steps between logging training metrics

model:
  d_model: 512
  n_layers: 3
  # obs_type: ["cpu"]
  # obs_type: ["cpu", "buffer"]
  obs_type: ["cpu", "bw", "buffer"]
  bias: true
  dropout: 0



