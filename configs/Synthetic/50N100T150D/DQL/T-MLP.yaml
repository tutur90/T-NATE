policy: "T-MLP"
algo: "DQL"

seed: 42

env:
  dataset: "Synthetic"
  flag: "50N100T150D"
  refresh_rate: 0.005

eval:
  lambda: [1.889e-03, 4.394e+00, 2.605e+02]
  expected_values: [0.2, 4.0, 300.0]


training:
    num_epochs: 50
    learning_starts: 5000
    warmup: 0
    buffer_size: 50000
    batch_size: 64
    target_update_freq: 10000
    update_freq: 1
    lr: 1.e-05
    lr_decay: 1
    gamma: 0.9
    exploration: {'strategy': 'ucb', 'explore_value': 0.5}
    reward: {'momentum': 0.9995, 'norm': 'standard', 'scale': 1, 'eps': 0.1, 'clip': 5.0, 'storage_norm': True, 'log1p': True}
    optimizer: {'type': 'Adam'}
    lambda: [0.5, 0.4, 0.1]
    early_stop_patience: 30
    log_freq: 0
    
model:
    d_model: 1024
    n_layers: 2
    obs_type: ['cpu', 'bw', 'buffer', 'task']
    bias: True
    dropout: 0

