policy: "NSGA2"

env:
  dataset: "Pakistan"
  flag: "Tuple30K"
  refresh_rate: 0.01

training:
  num_epochs: 30        # Number of generations
  pop_size: 30          # Population size
  mutation_mode: "fixed"  # "fixed" | "proportional" | "self_adaptive"
  mutation_sigma: null    # fixed: He std if null; proportional: scale factor (default 0.1)
  # mutation_tau: 0.1     # self_adaptive only: meta learning rate for σ factors
  # Max allowed value per objective [ttr, latency, energy] — null disables the constraint
  min_scores: [null, null, null]

model:
  d_model: 128
  n_layers: 3
  # obs_type: ["cpu"]
  obs_type: ["cpu", "bw", "buffer"]
